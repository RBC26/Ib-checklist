<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>IB 2026 — Remy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;
  --s1:#111;
  --s2:#161616;
  --s3:#1c1c1c;
  --border:#222;
  --border2:#2a2a2a;
  --text:#ede9e4;
  --dim:#666;
  --dimmer:#3a3a3a;
  --bio:#9b7fe8;
  --econ:#3dba71;
  --psych:#f97b3d;
  --maths:#4fa3e3;
  --eng:#e84f8b;
  --ita:#f5b429;
  --accent:#ede9e4;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;height:100%}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;line-height:1.6;min-height:100%;overflow-x:hidden}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(10,10,10,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:0;height:56px}
.brand{font-weight:800;font-size:15px;letter-spacing:-.02em;margin-right:auto;white-space:nowrap;display:flex;align-items:center;gap:8px}
.brand-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.ntabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;margin:0 16px}
.ntabs::-webkit-scrollbar{display:none}
.ntab{padding:0 14px;font-size:11px;font-weight:600;color:var(--dim);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;letter-spacing:.06em;text-transform:uppercase;height:56px;white-space:nowrap;font-family:'Syne',sans-serif}
.ntab:hover{color:var(--text)}
.ntab.on{color:var(--text);border-bottom-color:var(--text)}
.nav-prog{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-pct{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--text)}
.nav-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim)}

/* VIEWS */
.view{display:none;padding:80px 20px 40px;max-width:1060px;margin:0 auto}
.view.on{display:block}

/* COUNTDOWN */
.countdown-wrap{margin-bottom:40px}
.countdown-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.countdown-row{display:flex;gap:12px;flex-wrap:wrap}
.cd-block{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;text-align:center;min-width:72px;flex:1}
.cd-num{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:500;line-height:1;color:var(--text)}
.cd-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:4px}
.cd-exam-tag{background:rgba(237,233,228,.06);border:1px solid rgba(237,233,228,.12);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--text);letter-spacing:.03em;margin-top:12px;display:inline-block}

/* HERO */
.hero{margin-bottom:32px}
.hero h1{font-size:42px;font-weight:800;line-height:1.05;letter-spacing:-.03em;margin-bottom:8px}
.hero h1 em{color:var(--dim);font-style:normal}
.hero p{color:var(--dim);font-size:12px;font-weight:500;letter-spacing:.04em}

/* OVERALL PROGRESS */
.overall-prog{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:32px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.op-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);flex:1;min-width:120px}
.op-nums{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;margin-right:auto}
.op-pct{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:500}
.op-bar-wrap{width:100%;height:3px;background:var(--border);border-radius:3px;margin-top:10px}
.op-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--econ),var(--bio));transition:.5s ease}

/* SUBJECT TABS */
.sub-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.sub-tab{padding:6px 14px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.04em;border:1.5px solid var(--border2);background:transparent;color:var(--dim);cursor:pointer;transition:.15s;font-family:'Syne',sans-serif}
.sub-tab:hover{color:var(--text);border-color:var(--dimmer)}
.sub-tab.on{color:#0a0a0a;border-color:transparent}

/* CHECKLIST CARDS */
.cl-section{display:none}
.cl-section.on{display:block}
.cl-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px}
.cl-head{padding:18px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:.15s}
.cl-head:hover{background:var(--s2)}
.cl-accent{width:3px;border-radius:2px;height:20px;flex-shrink:0}
.cl-htitle{font-weight:700;font-size:15px;letter-spacing:-.01em;flex:1}
.cl-hpct{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;margin-left:auto;margin-right:12px}
.cl-harr{color:var(--dimmer);font-size:18px;transition:transform .2s;font-weight:300}
.cl-harr.open{transform:rotate(45deg)}
.cl-sub-prog{font-size:10px;font-weight:600;letter-spacing:.04em;color:var(--dim);margin-top:2px}
.cl-body{display:none;padding:0}
.cl-body.open{display:block}
.cl-section-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dimmer);padding:14px 20px 4px;margin-top:2px}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:7px 20px;cursor:pointer;transition:.13s;border-bottom:1px solid var(--border)}
.cl-item:last-child{border-bottom:none}
.cl-item:hover{background:rgba(255,255,255,.02)}
.cl-item input[type=checkbox]{appearance:none;-webkit-appearance:none;width:15px;height:15px;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border2);border-radius:4px;background:transparent;cursor:pointer;transition:.13s}
.cl-item input[type=checkbox]:checked{background-size:72%;background-repeat:no-repeat;background-position:center;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 12 12' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 6l3 3 5-5' stroke='%230a0a0a' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E")}
.cl-item label{font-size:12px;color:#aaa;line-height:1.55;cursor:pointer;flex:1;font-weight:400}
.cl-item.done label{text-decoration:line-through;color:var(--dimmer)}

/* Subject colors for checkboxes */
.bio-card .cl-item input[type=checkbox]:checked{background-color:var(--bio);border-color:var(--bio)}
.econ-card .cl-item input[type=checkbox]:checked{background-color:var(--econ);border-color:var(--econ)}
.psych-card .cl-item input[type=checkbox]:checked{background-color:var(--psych);border-color:var(--psych)}
.maths-card .cl-item input[type=checkbox]:checked{background-color:var(--maths);border-color:var(--maths)}
.eng-card .cl-item input[type=checkbox]:checked{background-color:var(--eng);border-color:var(--eng)}
.ita-card .cl-item input[type=checkbox]:checked{background-color:var(--ita);border-color:var(--ita)}

/* Mini progress bars in header */
.cl-mini-bar{width:60px;height:2px;background:var(--border);border-radius:2px;flex-shrink:0}
.cl-mini-fill{height:100%;border-radius:2px;transition:.4s}

/* SUBJECT OVERVIEW GRID */
.sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:32px}
.sub-tile{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:.18s}
.sub-tile:hover{border-color:var(--border2);transform:translateY(-1px)}
.sub-tile-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sub-tile-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sub-tile-name{font-weight:700;font-size:13px;letter-spacing:-.01em}
.sub-tile-pct{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500}
.sub-tile-bar{width:100%;height:2px;background:var(--border);border-radius:2px}
.sub-tile-fill{height:100%;border-radius:2px;transition:.5s}
.sub-tile-sub{font-size:10px;color:var(--dim);margin-top:6px;font-weight:600;letter-spacing:.03em}

/* DAILY LOG BUTTON */
.log-fab{position:fixed;bottom:24px;right:20px;z-index:300;background:var(--text);color:var(--bg);border:none;border-radius:14px;padding:12px 18px;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:.05em;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 4px 24px rgba(0,0,0,.5);transition:.18s}
.log-fab:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.6)}
.log-fab-dot{width:7px;height:7px;border-radius:50%;background:var(--econ);flex-shrink:0}
.log-badge{background:var(--econ);color:#0a0a0a;border-radius:100px;padding:2px 7px;font-size:10px;font-weight:800;margin-left:2px;display:none}

/* MODAL OVERLAY */
.log-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center}
.log-overlay.open{display:flex}
@media(min-width:600px){.log-overlay{align-items:center}}
.log-modal{background:var(--s1);border:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .22s ease}
@media(min-width:600px){.log-modal{border-radius:20px;max-height:80vh}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.log-modal-head{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.log-modal-title{font-size:16px;font-weight:800;letter-spacing:-.02em;flex:1}
.log-modal-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);font-weight:500}
.log-close{background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;padding:0;line-height:1;transition:.13s;font-weight:300}
.log-close:hover{color:var(--text)}
.log-modal-body{overflow-y:auto;flex:1;padding:0}

/* TODAY'S PROGRESS PANEL (inside modal, top) */
.log-today{padding:18px 22px;border-bottom:1px solid var(--border)}
.log-today-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.log-today-count{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:500;line-height:1;margin-bottom:4px}
.log-today-sub{font-size:11px;color:var(--dim);font-weight:600;margin-bottom:14px}
.log-generate-btn{background:var(--text);color:var(--bg);border:none;border-radius:10px;padding:11px 20px;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:.04em;cursor:pointer;transition:.15s;width:100%}
.log-generate-btn:hover{opacity:.88}
.log-generate-btn:disabled{opacity:.35;cursor:not-allowed}

/* GENERATED SUMMARY CARD */
.log-summary-card{margin:0 22px 16px;background:var(--s2);border:1px solid var(--border2);border-radius:12px;overflow:hidden;display:none}
.log-summary-card.visible{display:block}
.log-summary-head{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.log-summary-date-badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;background:rgba(61,186,113,.15);color:var(--econ);border-radius:6px;padding:3px 8px}
.log-summary-count-badge{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);margin-left:auto}
.log-summary-items{padding:10px 0}
.log-summary-subj{padding:6px 16px;display:flex;align-items:flex-start;gap:8px}
.log-summary-subj-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.log-summary-subj-name{font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--dim);margin-bottom:2px;text-transform:uppercase}
.log-summary-subj-items{font-size:11px;color:var(--text);line-height:1.55;font-weight:400}
.log-copy-btn{margin:0 16px 12px;padding:8px 0;background:none;border:1px solid var(--border2);border-radius:8px;color:var(--dim);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;width:calc(100% - 32px);transition:.13s;letter-spacing:.03em}
.log-copy-btn:hover{border-color:var(--dimmer);color:var(--text)}

/* HISTORY SECTION */
.log-history{padding:16px 22px 0}
.log-history-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.log-history-empty{font-size:11px;color:var(--dimmer);padding-bottom:16px}
.log-hist-entry{background:var(--s2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.log-hist-head{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:.13s}
.log-hist-head:hover{background:var(--s3)}
.log-hist-date{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;flex:1}
.log-hist-cnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--econ);font-weight:600;background:rgba(61,186,113,.1);border-radius:6px;padding:2px 7px}
.log-hist-arr{color:var(--dimmer);font-size:14px;transition:.15s}
.log-hist-body{display:none;padding:8px 14px 12px;border-top:1px solid var(--border)}
.log-hist-body.open{display:block}
.log-hist-subj-row{margin-bottom:6px}
.log-hist-subj-name{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:2px}
.log-hist-subj-items{font-size:11px;color:var(--text);line-height:1.55}

/* RESPONSIVE */
@media(max-width:600px){
  .hero h1{font-size:30px}
  .cd-num{font-size:24px}
  .cd-block{padding:12px 10px}
  .view{padding:76px 14px 40px}
  .nav{padding:0 14px}
  .ntab{padding:0 10px;font-size:10px}
  .brand{font-size:13px}
  .sub-grid{grid-template-columns:1fr 1fr}
  .overall-prog{gap:12px}
}
@media(max-width:380px){
  .sub-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="brand"><div class="brand-dot"></div>IB 2026</div>
  <div class="ntabs">
    <button class="ntab on" onclick="showView('home',this)">Overview</button>
    <button class="ntab" onclick="showView('bio',this)">Biology</button>
    <button class="ntab" onclick="showView('econ',this)">Economics</button>
    <button class="ntab" onclick="showView('psych',this)">Psychology</button>
    <button class="ntab" onclick="showView('maths',this)">Maths</button>
    <button class="ntab" onclick="showView('eng',this)">English</button>
    <button class="ntab" onclick="showView('ita',this)">Italian</button>
  </div>
  <div class="nav-prog">
    <div>
      <div class="nav-pct" id="navPct">0%</div>
      <div class="nav-sub" id="navSub">0/0</div>
    </div>
  </div>
</nav>

<!-- HOME -->
<div id="v-home" class="view on">
  <div class="countdown-wrap">
    <div class="countdown-label">First exam countdown</div>
    <div class="countdown-row">
      <div class="cd-block"><div class="cd-num" id="cdD">--</div><div class="cd-lbl">Days</div></div>
      <div class="cd-block"><div class="cd-num" id="cdH">--</div><div class="cd-lbl">Hours</div></div>
      <div class="cd-block"><div class="cd-num" id="cdM">--</div><div class="cd-lbl">Mins</div></div>
      <div class="cd-block"><div class="cd-num" id="cdS">--</div><div class="cd-lbl">Secs</div></div>
    </div>
    <div class="cd-exam-tag">First exam: 5 May 2026</div>
  </div>

  <div class="hero">
    <h1>Subject<br><em>Checklists</em></h1>
    <p>IB DIPLOMA 2026 &nbsp;·&nbsp; 6 SUBJECTS &nbsp;·&nbsp; SAVES OFFLINE</p>
  </div>

  <div class="overall-prog">
    <div style="flex:1">
      <div class="op-label">Overall revision progress</div>
      <div class="op-bar-wrap"><div class="op-bar" id="opBar" style="width:0%"></div></div>
    </div>
    <div>
      <div class="op-pct" id="opPct">0%</div>
      <div class="op-nums" id="opNums">0 / 0 topics</div>
    </div>
  </div>

  <div class="sub-grid" id="subGrid"></div>
</div>

<!-- SUBJECT VIEWS -->
<div id="v-bio" class="view"></div>
<div id="v-econ" class="view"></div>
<div id="v-psych" class="view"></div>
<div id="v-maths" class="view"></div>
<div id="v-eng" class="view"></div>
<div id="v-ita" class="view"></div>

<!-- DAILY LOG FAB -->
<button class="log-fab" onclick="openLogModal()">
  <div class="log-fab-dot"></div>
  Daily Log
  <span class="log-badge" id="logBadge">0</span>
</button>

<!-- DAILY LOG MODAL -->
<div class="log-overlay" id="logOverlay" onclick="closeLogModal(event)">
  <div class="log-modal" id="logModal">
    <div class="log-modal-head">
      <div>
        <div class="log-modal-title">Daily Study Log</div>
        <div class="log-modal-date" id="logModalDate"></div>
      </div>
      <button class="log-close" onclick="closeLogModal()">×</button>
    </div>
    <div class="log-modal-body">

      <!-- TODAY SECTION -->
      <div class="log-today">
        <div class="log-today-label">Today's progress</div>
        <div class="log-today-count" id="logTodayCount">0</div>
        <div class="log-today-sub" id="logTodaySub">items ticked since last log</div>
        <button class="log-generate-btn" id="logGenBtn" onclick="generateDailyLog()">
          ✦ Save today's summary
        </button>
      </div>

      <!-- GENERATED SUMMARY (current day) -->
      <div id="logSummaryWrap" style="padding:16px 0 0"></div>

      <!-- HISTORY -->
      <div class="log-history">
        <div class="log-history-label">Previous logs</div>
        <div id="logHistoryList"></div>
      </div>

    </div>
  </div>
</div>

<script>
// ─── STORAGE ───
const SK = 'ibremy2026v3';
let sv = {};
try { sv = JSON.parse(localStorage.getItem(SK) || '{}'); } catch(e){}
function save(){ try{ localStorage.setItem(SK, JSON.stringify(sv)); }catch(e){} }

// ─── COLOURS ───
const COLS = { bio:'#9b7fe8', econ:'#3dba71', psych:'#f97b3d', maths:'#4fa3e3', eng:'#e84f8b', ita:'#f5b429' };

// ─── CHECKLISTS DATA ───
const SUBJECTS = [
// ══════════════════════════════════════════
// BIOLOGY HL
// ══════════════════════════════════════════
{ id:'bio', name:'Biology HL', col:'bio',
  sections:[
    { s:'Theme A — Unity & Diversity', items:[
      'A1.1 Water — 4 properties (cohesion/adhesion, high SHC, excellent solvent, high latent heat of vaporisation) + biological significance of each',
      'A1.2 Nucleic acids — DNA vs RNA structure; differences; roles of mRNA, tRNA, rRNA',
      'A2.1 Origins of cells (HL) — early Earth conditions; RNA world hypothesis; endosymbiosis evidence',
      'A2.2 Cell structure — all organelle names, functions, ultrastructure; prokaryote vs eukaryote comparison',
      'A2.3 Viruses (HL) — structure; lytic vs lysogenic cycle; HIV lifecycle; retrovirus mechanism',
      'A3.1 Diversity of organisms — classification groups; binomial nomenclature; dichotomous keys',
      'A3.2 Classification and cladistics (HL) — cladograms; shared derived characters; constructing and interpreting cladograms',
      'A4.1 Evolution and speciation — natural selection mechanism; species concepts; allopatric vs sympatric speciation',
      'A4.2 Conservation of biodiversity — threats to biodiversity; conservation strategies; extinction causes',
    ]},
    { s:'Theme B — Form & Function', items:[
      'B1.1 Carbohydrates and lipids — monosaccharides, disaccharides, polysaccharides; condensation/hydrolysis; saturated vs unsaturated; phospholipid structure',
      'B1.2 Proteins — 20 amino acids concept; peptide bonds; 4 levels of structure; globular vs fibrous proteins',
      'B2.1 Membranes and membrane transport — fluid mosaic model; all 5 transport types (diffusion, facilitated diffusion, osmosis, active transport, endo/exocytosis)',
      'B2.2 Organelles and compartmentalisation — why membrane-bound organelles increase efficiency; specific examples',
      'B2.3 Cell specialisation — differentiation (same DNA, different gene expression); structure-function examples: RBC, neuron, palisade cell',
      'B3.1 Gas exchange — SA:V ratio; alveolar structure; ventilation mechanics (diaphragm + intercostals); partial pressure gradients',
      'B3.2 Transport — double circulation; heart structure and blood flow; cardiac cycle; SAN/AVN/Bundle of His; blood vessels comparison',
      'B3.3 Muscle and motility (HL) — sarcomere structure (Z lines, I band, A band, H zone, M line); sliding filament theory; Ca²⁺ + troponin/tropomyosin mechanism; slow vs fast twitch',
      'B4.1 Adaptation to environment — structural, behavioural, physiological adaptations; biome examples',
      'B4.2 Ecological niches — niche concept; competitive exclusion principle; character displacement',
    ]},
    { s:'Theme C — Interaction & Interdependence', items:[

// ─── RENDER ENGINE ───
function init(){
  buildSubGrid();
  SUBJECTS.forEach(sub => buildSubjectView(sub));
  updateAll();
  startCountdown();
}

function buildSubGrid(){
  const grid = document.getElementById('subGrid');
  SUBJECTS.forEach(sub => {
    const tile = document.createElement('div');
    tile.className = 'sub-tile';
    tile.id = 'tile-' + sub.id;
    tile.onclick = () => {
      const btn = document.querySelector(`.ntab[onclick="showView('${sub.id}',this)"]`);
      showView(sub.id, btn);
    };
    tile.innerHTML = `
      <div class="sub-tile-top">
        <div class="sub-tile-dot" style="background:${COLS[sub.col]}"></div>
        <div class="sub-tile-name">${sub.name}</div>
        <div class="sub-tile-pct" style="color:${COLS[sub.col]}" id="tile-pct-${sub.id}">0%</div>
      </div>
      <div class="sub-tile-bar"><div class="sub-tile-fill" style="background:${COLS[sub.col]}" id="tile-bar-${sub.id}"></div></div>
      <div class="sub-tile-sub" id="tile-sub-${sub.id}">0 / 0 topics</div>`;
    grid.appendChild(tile);
  });
}

function buildSubjectView(sub){
  const view = document.getElementById('v-' + sub.id);
  // Hero
  const hero = document.createElement('div');
  hero.className = 'hero';
  hero.innerHTML = `<h1>${sub.name.split(' ')[0]}<br><em>${sub.name.split(' ').slice(1).join(' ')}</em></h1><p style="color:var(--dim);font-size:12px;font-weight:600;letter-spacing:.04em" id="hero-sub-${sub.id}">Loading...</p>`;
  view.appendChild(hero);

  // Overall card progress bar
  const progBar = document.createElement('div');
  progBar.style.cssText = 'background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap';
  progBar.innerHTML = `<div style="flex:1"><div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px">Subject Progress</div><div style="width:100%;height:3px;background:var(--border);border-radius:3px"><div id="sp-bar-${sub.id}" style="height:100%;border-radius:3px;background:${COLS[sub.col]};transition:.5s;width:0%"></div></div></div><div id="sp-pct-${sub.id}" style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:${COLS[sub.col]}">0%</div>`;
  view.appendChild(progBar);

  // Sections
  sub.sections.forEach((sec, si) => {
    const card = document.createElement('div');
    card.className = `cl-card ${sub.col}-card`;
    card.id = `card-${sub.id}-${si}`;

    const itemCount = sec.items.length;
    const head = document.createElement('div');
    head.className = 'cl-head';
    head.innerHTML = `
      <div class="cl-accent" style="background:${COLS[sub.col]}"></div>
      <div style="flex:1"><div class="cl-htitle">${sec.s}</div><div class="cl-sub-prog" id="sp-${sub.id}-${si}">0/${itemCount} done</div></div>
      <div class="cl-mini-bar"><div class="cl-mini-fill" id="mf-${sub.id}-${si}" style="background:${COLS[sub.col]};width:0%"></div></div>
      <div class="cl-hpct" id="pct-${sub.id}-${si}">0%</div>
      <div class="cl-harr" id="arr-${sub.id}-${si}">+</div>`;
    head.onclick = () => toggleSection(sub.id, si);
    card.appendChild(head);

    const body = document.createElement('div');
    body.className = 'cl-body';
    body.id = `body-${sub.id}-${si}`;

    sec.items.forEach((item, ii) => {
      const key = `${sub.id}_${si}_${ii}`;
      const checked = sv[key] || false;
      const row = document.createElement('div');
      row.className = 'cl-item' + (checked ? ' done' : '');
      row.id = `row-${key}`;
      row.innerHTML = `<input type="checkbox" id="cb-${key}" ${checked ? 'checked' : ''}><label for="cb-${key}">${item}</label>`;
      const cb = row.querySelector('input');
      cb.addEventListener('change', function(){
        sv[key] = this.checked;
        row.classList.toggle('done', this.checked);
        save();
        updateSection(sub.id, si);
        updateSubject(sub);
        updateAll();
      });
      body.appendChild(row);
    });

    card.appendChild(body);
    view.appendChild(card);
  });
}

function toggleSection(subId, si){
  const body = document.getElementById(`body-${subId}-${si}`);
  const arr = document.getElementById(`arr-${subId}-${si}`);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  arr.classList.toggle('open', !isOpen);
  arr.textContent = isOpen ? '+' : '−';
}

function updateSection(subId, si){
  const sub = SUBJECTS.find(s => s.id === subId);
  const sec = sub.sections[si];
  let done = 0;
  sec.items.forEach((_, ii) => { if(sv[`${subId}_${si}_${ii}`]) done++; });
  const tot = sec.items.length;
  const pct = Math.round(done / Math.max(tot,1) * 100);
  const el = document.getElementById(`sp-${subId}-${si}`);
  const pe = document.getElementById(`pct-${subId}-${si}`);
  const mf = document.getElementById(`mf-${subId}-${si}`);
  if(el) el.textContent = `${done}/${tot} done`;
  if(pe) pe.textContent = pct + '%';
  if(mf) mf.style.width = pct + '%';
}

function updateSubject(sub){
  let done = 0, tot = 0;
  sub.sections.forEach((sec, si) => {
    sec.items.forEach((_, ii) => {
      tot++;
      if(sv[`${sub.id}_${si}_${ii}`]) done++;
    });
  });
  const pct = Math.round(done / Math.max(tot,1) * 100);
  // Update subject view bar
  const bar = document.getElementById(`sp-bar-${sub.id}`);
  const pctEl = document.getElementById(`sp-pct-${sub.id}`);
  const heroSub = document.getElementById(`hero-sub-${sub.id}`);
  if(bar) bar.style.width = pct + '%';
  if(pctEl) pctEl.textContent = pct + '%';
  if(heroSub) heroSub.textContent = `${done} / ${tot} TOPICS · ${pct}% COMPLETE`;
  // Update tile
  const tilePct = document.getElementById(`tile-pct-${sub.id}`);
  const tileBar = document.getElementById(`tile-bar-${sub.id}`);
  const tileSub = document.getElementById(`tile-sub-${sub.id}`);
  if(tilePct) tilePct.textContent = pct + '%';
  if(tileBar) tileBar.style.width = pct + '%';
  if(tileSub) tileSub.textContent = `${done} / ${tot} topics`;
}

function updateAll(){
  let totalDone = 0, totalTot = 0;
  SUBJECTS.forEach(sub => {
    sub.sections.forEach((sec, si) => {
      sec.items.forEach((_, ii) => {
        totalTot++;
        if(sv[`${sub.id}_${si}_${ii}`]) totalDone++;
      });
    });
    updateSubject(sub);
    sub.sections.forEach((_, si) => updateSection(sub.id, si));
  });
  const pct = Math.round(totalDone / Math.max(totalTot,1) * 100);
  const bar = document.getElementById('opBar');
  const pctEl = document.getElementById('opPct');
  const numsEl = document.getElementById('opNums');
  if(bar) bar.style.width = pct + '%';
  if(pctEl) pctEl.textContent = pct + '%';
  if(numsEl) numsEl.textContent = `${totalDone} / ${totalTot} topics`;
  const navPct = document.getElementById('navPct');
  const navSub = document.getElementById('navSub');
  if(navPct) navPct.textContent = pct + '%';
  if(navSub) navSub.textContent = `${totalDone}/${totalTot}`;
}

// ─── VIEW SWITCHING ───
function showView(name, btn){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(b => b.classList.remove('on'));
  const v = document.getElementById('v-' + name);
  if(v) v.classList.add('on');
  if(btn) btn.classList.add('on');
  window.scrollTo(0,0);
}

// ─── COUNTDOWN ───
function startCountdown(){
  function update(){
    const target = new Date('2026-05-05T09:00:00');
    const now = new Date();
    let diff = target - now;
    if(diff < 0){ diff = 0; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('cdD').textContent = d;
    document.getElementById('cdH').textContent = pad(h);
    document.getElementById('cdM').textContent = pad(m);
    document.getElementById('cdS').textContent = pad(s);
  }
  update();
  setInterval(update, 1000);
}

// ─── DAILY LOG SYSTEM ───
const LOG_SK = 'ibremy2026_dailylogs';
const SNAPSHOT_SK = 'ibremy2026_snapshot';

function getLogs(){
  try{ return JSON.parse(localStorage.getItem(LOG_SK) || '[]'); }catch(e){ return []; }
}
function saveLogs(logs){
  try{ localStorage.setItem(LOG_SK, JSON.stringify(logs)); }catch(e){}
}
function getSnapshot(){
  try{ return JSON.parse(localStorage.getItem(SNAPSHOT_SK) || '{}'); }catch(e){ return {}; }
}
function saveSnapshot(snap){
  try{ localStorage.setItem(SNAPSHOT_SK, JSON.stringify(snap)); }catch(e){}
}

// Returns items ticked since last snapshot
function getNewItemsSinceSnapshot(){
  const snap = getSnapshot();
  const newItems = {}; // subject -> [{label, sectionName}]
  SUBJECTS.forEach(sub => {
    sub.sections.forEach((sec, si) => {
      sec.items.forEach((item, ii) => {
        const key = `${sub.id}_${si}_${ii}`;
        const nowChecked = sv[key] || false;
        const wasChecked = snap[key] || false;
        if(nowChecked && !wasChecked){
          if(!newItems[sub.id]) newItems[sub.id] = { name: sub.name, col: sub.col, items: [] };
          newItems[sub.id].items.push({ label: item, section: sec.s });
        }
      });
    });
  });
  return newItems;
}

function countNewItems(){
  const ni = getNewItemsSinceSnapshot();
  return Object.values(ni).reduce((a, s) => a + s.items.length, 0);
}

function formatDateFull(d){
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}
function formatDateShort(d){
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getDate())} ${months[d.getMonth()]} ${d.getFullYear()} — ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function openLogModal(){
  const overlay = document.getElementById('logOverlay');
  overlay.classList.add('open');
  // Set date
  document.getElementById('logModalDate').textContent = formatDateFull(new Date()).toUpperCase();
  refreshLogModal();
}

function closeLogModal(e){
  if(e && e.target && e.target.id !== 'logOverlay' && !e.target.classList.contains('log-close')) return;
  document.getElementById('logOverlay').classList.remove('open');
}

function refreshLogModal(){
  const newItems = getNewItemsSinceSnapshot();
  const count = Object.values(newItems).reduce((a,s) => a + s.items.length, 0);
  document.getElementById('logTodayCount').textContent = count;
  document.getElementById('logTodaySub').textContent = count === 1 ? 'item ticked since last log' : 'items ticked since last log';

  const btn = document.getElementById('logGenBtn');
  btn.disabled = count === 0;
  btn.textContent = count === 0 ? '— Nothing new to log yet —' : '✦ Save today\'s summary';

  // Update badge on FAB
  const badge = document.getElementById('logBadge');
  if(count > 0){ badge.style.display = 'inline-block'; badge.textContent = count; }
  else { badge.style.display = 'none'; }

  // Render history
  renderHistory();
}

function generateDailyLog(){
  const newItems = getNewItemsSinceSnapshot();
  const count = Object.values(newItems).reduce((a,s) => a + s.items.length, 0);
  if(count === 0) return;

  const now = new Date();
  const log = {
    date: now.toISOString(),
    dateLabel: formatDateShort(now),
    count: count,
    subjects: newItems
  };

  const logs = getLogs();
  logs.unshift(log); // newest first
  saveLogs(logs);

  // Update snapshot — mark all currently checked items as snapshotted
  const newSnap = {};
  SUBJECTS.forEach(sub => {
    sub.sections.forEach((sec, si) => {
      sec.items.forEach((_, ii) => {
        const key = `${sub.id}_${si}_${ii}`;
        if(sv[key]) newSnap[key] = true;
      });
    });
  });
  saveSnapshot(newSnap);

  // Show confirmation and refresh
  showSummaryCard(log);
  refreshLogModal();
}

function showSummaryCard(log){
  const wrap = document.getElementById('logSummaryWrap');
  wrap.innerHTML = renderSummaryCardHTML(log, true);
}

function renderSummaryCardHTML(log, isNew){
  const cols = COLS;
  let subjectBlocks = '';
  Object.entries(log.subjects).forEach(([subId, subData]) => {
    const col = cols[subData.col || subId] || '#999';
    const itemLines = subData.items.map(it => {
      // Truncate long labels for readability
      const shortLabel = it.label.length > 90 ? it.label.substring(0,90) + '…' : it.label;
      return `<div style="padding:2px 0;border-bottom:1px solid var(--border);margin-bottom:2px;font-size:11px;color:var(--text);line-height:1.5">${shortLabel}</div>`;
    }).join('');
    subjectBlocks += `
      <div style="padding:10px 16px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
          <div style="width:6px;height:6px;border-radius:50%;background:${col};flex-shrink:0"></div>
          <div style="font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:${col}">${subData.name}</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);margin-left:auto">${subData.items.length} item${subData.items.length!==1?'s':''}</div>
        </div>
        ${itemLines}
      </div>`;
  });

  const newLabel = isNew ? '<span style="font-size:9px;font-weight:700;color:var(--econ);letter-spacing:.06em;text-transform:uppercase;background:rgba(61,186,113,.12);border-radius:4px;padding:2px 6px">Saved</span>' : '';

  return `
    <div style="margin:0 22px 16px;background:var(--s2);border:1px solid var(--border2);border-radius:12px;overflow:hidden;animation:slideUp .2s ease">
      <div style="padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)">
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;flex:1;color:var(--text)">${log.dateLabel}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;background:rgba(61,186,113,.12);color:var(--econ);border-radius:6px;padding:2px 7px">${log.count} done</div>
        ${newLabel}
      </div>
      ${subjectBlocks}
      <div style="padding:10px 16px">
        <button onclick="copyLogToClipboard(this)" style="width:100%;padding:8px 0;background:none;border:1px solid var(--border2);border-radius:8px;color:var(--dim);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:.13s;letter-spacing:.03em">Copy to clipboard</button>
      </div>
    </div>`;
}

function copyLogToClipboard(btn){
  const logs = getLogs();
  if(!logs.length) return;
  const log = logs[0];
  let text = `IB Study Log — ${log.dateLabel}\n`;
  text += `${log.count} item${log.count!==1?'s':''} completed\n\n`;
  Object.entries(log.subjects).forEach(([_, subData]) => {
    text += `${subData.name.toUpperCase()}\n`;
    subData.items.forEach(it => { text += `  • ${it.label}\n`; });
    text += '\n';
  });
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = 'Copy to clipboard'; }, 2000);
  }).catch(() => { btn.textContent = 'Copy failed'; });
}

function renderHistory(){
  const logs = getLogs();
  const container = document.getElementById('logHistoryList');
  if(!logs.length){
    container.innerHTML = '<div class="log-history-empty">No logs saved yet. Tick some items and press save!</div>';
    return;
  }
  container.innerHTML = logs.map((log, i) => {
    const subjectPills = Object.entries(log.subjects).map(([subId, subData]) => {
      const col = COLS[subData.col || subId] || '#999';
      return `<span style="font-size:9px;font-weight:700;background:rgba(150,150,150,.1);border-radius:4px;padding:1px 5px;color:var(--dim)">${subData.name.split(' ')[0]}: ${subData.items.length}</span>`;
    }).join(' ');

    let subjectBlocks = '';
    Object.entries(log.subjects).forEach(([subId, subData]) => {
      const col = COLS[subData.col || subId] || '#999';
      subjectBlocks += `
        <div style="margin-bottom:8px">
          <div style="font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:${col};margin-bottom:4px">${subData.name}</div>
          ${subData.items.map(it => `<div style="font-size:11px;color:var(--text);line-height:1.5;padding:1px 0;border-bottom:1px solid var(--border)">${it.label.length>80?it.label.substring(0,80)+'…':it.label}</div>`).join('')}
        </div>`;
    });

    return `
      <div class="log-hist-entry">
        <div class="log-hist-head" onclick="toggleHistEntry(${i})">
          <div class="log-hist-date">${log.dateLabel}</div>
          <div class="log-hist-cnt">${log.count}</div>
          <div class="log-hist-arr" id="hist-arr-${i}">▾</div>
        </div>
        <div class="log-hist-body" id="hist-body-${i}">
          ${subjectPills ? `<div style="margin-bottom:10px;display:flex;gap:4px;flex-wrap:wrap">${subjectPills}</div>` : ''}
          ${subjectBlocks}
          <button onclick="copyHistLog(${i})" style="margin-top:6px;width:100%;padding:6px 0;background:none;border:1px solid var(--border2);border-radius:7px;color:var(--dim);font-family:'Syne',sans-serif;font-size:10px;font-weight:700;cursor:pointer;transition:.13s">Copy this log</button>
          <button onclick="deleteHistLog(${i})" style="margin-top:4px;width:100%;padding:6px 0;background:none;border:1px solid rgba(239,68,68,.2);border-radius:7px;color:rgba(239,68,68,.5);font-family:'Syne',sans-serif;font-size:10px;font-weight:700;cursor:pointer;transition:.13s">Delete</button>
        </div>
      </div>`;
  }).join('') + '<div style="height:20px"></div>';
}

function toggleHistEntry(i){
  const body = document.getElementById(`hist-body-${i}`);
  const arr = document.getElementById(`hist-arr-${i}`);
  const open = body.classList.toggle('open');
  arr.style.transform = open ? 'rotate(180deg)' : '';
}

function copyHistLog(i){
  const logs = getLogs();
  const log = logs[i];
  if(!log) return;
  let text = `IB Study Log — ${log.dateLabel}\n${log.count} items completed\n\n`;
  Object.entries(log.subjects).forEach(([_, subData]) => {
    text += `${subData.name.toUpperCase()}\n`;
    subData.items.forEach(it => { text += `  • ${it.label}\n`; });
    text += '\n';
  });
  navigator.clipboard.writeText(text).catch(()=>{});
}

function deleteHistLog(i){
  const logs = getLogs();
  logs.splice(i, 1);
  saveLogs(logs);
  renderHistory();
}

// Update the existing save() call to also refresh log badge
const _origSave = save;
// Override checkbox handler to refresh badge
document.addEventListener('change', function(e){
  if(e.target && e.target.type === 'checkbox'){
    // slight delay to let sv update
    setTimeout(() => {
      const count = countNewItems();
      const badge = document.getElementById('logBadge');
      if(badge){
        if(count > 0){ badge.style.display = 'inline-block'; badge.textContent = count; }
        else { badge.style.display = 'none'; }
      }
    }, 50);
  }
});

// Close modal on ESC
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') document.getElementById('logOverlay').classList.remove('open');
});

// ─── BOOT ───
init();

// Init badge after boot
setTimeout(() => {
  const count = countNewItems();
  const badge = document.getElementById('logBadge');
  if(count > 0){ badge.style.display = 'inline-block'; badge.textContent = count; }
}, 100);
</script>
</body>
</html>
